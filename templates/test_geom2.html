<!DOCTYPE html>
<html><body>
<script type="module">
import * as pdfjsLib from '/static/js/pdf.mjs';
pdfjsLib.GlobalWorkerOptions.workerSrc = '/static/js/pdf.worker.mjs';

pdfjsLib.getDocument('/api/download/ejemplod_e_archivo_.pdf').promise.then(pdf => {
    pdf.getPage(1).then(page => {
        // Assume user views this at rotation 180 (where it looks perfectly horizontal and readable)
        const vp180 = page.getViewport({scale: 1.0, rotation: 180});
        
        // Imagine user draws a box on the word "perfume" near bottom left (X=369, Y=466 in PyMuPDF)
        // Let's just pass some DOM pixels (e.g. 50, 50, 100, 10) through convertToPdfPoint
        const pt1 = vp180.convertToPdfPoint(0, 0);
        const pt2 = vp180.convertToPdfPoint(100, 100);
        
        console.log("vp180 convertToPdfPoint(0, 0) ->", pt1);
        console.log("vp180 convertToPdfPoint(100, 100) ->", pt2);
        
        fetch('/log_geom?rot=180&vp0=' + pt1 + '&vpNat=' + pt2);
    });
});
</script>
</body></html>
