<!DOCTYPE html>
<html>

<body>
    <script type="module">
        import * as pdfjsLib from '/static/js/pdf.mjs';
        pdfjsLib.GlobalWorkerOptions.workerSrc = '/static/js/pdf.worker.mjs';

        pdfjsLib.getDocument('/api/download/ejemplod_e_archivo_.pdf').promise.then(pdf => {
            pdf.getPage(1).then(page => {
                const vp0 = page.getViewport({ scale: 1.0, rotation: 0 });
                const vpNat = page.getViewport({ scale: 1.0 }); // honors native rotation
                console.log("Native page.rotate:", page.rotate);
                console.log("vp0 dimensions:", vp0.width, "x", vp0.height);
                console.log("vpNat dimensions:", vpNat.width, "x", vpNat.height);

                // send it to console/app.py? No I'll just throw it.
                fetch('/log_geom?rot=' + page.rotate + '&vp0=' + vp0.width + 'x' + vp0.height + '&vpNat=' + vpNat.width + 'x' + vpNat.height);
            });
        });
    </script>
</body>

</html>
